<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create account — Smart Lender</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="grain"></div>

<div class="container" style="min-height:100dvh;display:grid;place-items:center;padding:3rem 1rem">
    <div class="reveal in" style="width:min(940px,100%)">
        <a href="/" class="nav-brand justify-content-center d-flex mb-4"><span class="mark"><i class="ph ph-bank"></i></span> Smart Lender</a>
        <div class="bezel">
            <div class="glass auth-split">
                <!-- Visual panel -->
                <div class="auth-visual">
                    <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=900&q=80" alt="Team closing a deal">
                    <span class="pill ok" style="align-self:flex-start"><i class="ph ph-user-plus"></i> Free to start</span>
                    <div>
                        <div class="av-quote">"Score your first loan application in under a minute."</div>
                        <p class="text-muted-2 mt-3 mb-0" style="color:#c8d0dd!important">Random Forest engine · risk tiers · signed PDF reports.</p>
                    </div>
                </div>
                <!-- Form panel -->
                <div class="auth-form">
                    <span class="eyebrow"><i class="ph ph-user-plus"></i> Get started</span>
                    <h1 class="mt-3" style="font-size:2rem">Create your account</h1>
                    <p class="text-muted-2">Start scoring loan applications in minutes.</p>

                    {% if error %}
                    <div class="alert-glass mt-3"><i class="ph ph-warning-circle"></i> {{ error }}</div>
                    {% endif %}

                    <form action="/registerUser" method="POST" class="mt-4">
                        <div class="mb-3">
                            <label class="form-label">Full name</label>
                            <input type="text" name="fullname" class="form-control" placeholder="Alex Morgan" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="you@company.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Choose a strong password" required>
                        </div>
                        <button type="submit" class="btn-glow violet w-100 justify-content-center">Create account <span class="pip"><i class="ph ph-arrow-right"></i></span></button>
                    </form>

                    <p class="text-muted-2 text-center mt-4 mb-0" style="font-size:.9rem">Already registered? <a href="/login" class="text-emerald" style="text-decoration:none;font-weight:600">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
