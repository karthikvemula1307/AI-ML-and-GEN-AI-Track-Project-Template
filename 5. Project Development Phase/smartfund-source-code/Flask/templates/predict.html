<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New prediction — Smart Lender</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="grain"></div>

<nav class="nav-island">
    <a href="/" class="nav-brand"><span class="mark"><i class="ph ph-bank"></i></span> Smart Lender</a>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/predict">Predict</a>
        <a href="/history">History</a>
    </div>
    <a href="/logout" class="btn-ghost"><i class="ph ph-sign-out"></i> Logout</a>
</nav>

<div class="container section" style="padding-top:3rem">
    <div class="row g-5">
        <!-- LEFT INTRO -->
        <div class="col-lg-4 reveal">
            <span class="eyebrow"><i class="ph ph-brain"></i> AI assistant</span>
            <h1 class="mt-3" style="font-size:clamp(1.8rem,4vw,2.6rem)">Score an application</h1>
            <p class="lead-2 mt-3">Fill in the applicant profile. The Random Forest engine returns eligibility, confidence and a risk tier in real time.</p>
            <div class="bezel mt-4">
                <div class="glass p-4">
                    <div class="d-flex gap-3 mb-3"><i class="ph ph-shield-check text-emerald" style="font-size:1.4rem"></i><div><div style="color:#fff;font-weight:600">Private & secure</div><div class="text-muted-2" style="font-size:.85rem">Data stays in your SQLite instance.</div></div></div>
                    <hr class="divider" style="margin:1rem 0">
                    <div class="d-flex gap-3"><i class="ph ph-lightning text-emerald" style="font-size:1.4rem"></i><div><div style="color:#fff;font-weight:600">Instant scoring</div><div class="text-muted-2" style="font-size:.85rem">Results in under a second.</div></div></div>
                </div>
            </div>
        </div>

        <!-- FORM -->
        <div class="col-lg-8 reveal">
            <div class="bezel">
                <div class="glass p-4 p-md-5">
                    <form action="/submit" method="POST">
                        <div class="row g-4">
                            <div class="col-12">
                                <label class="form-label">Applicant name</label>
                                <input type="text" name="applicant_name" class="form-control" placeholder="Alex Morgan" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Gender</label>
                                <select name="gender" class="form-select"><option value="1">Male</option><option value="0">Female</option></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Married</label>
                                <select name="married" class="form-select"><option value="1">Yes</option><option value="0">No</option></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Dependents</label>
                                <select name="dependents" class="form-select"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3+</option></select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Education</label>
                                <select name="education" class="form-select"><option value="1">Graduate</option><option value="0">Not Graduate</option></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Self employed</label>
                                <select name="self_employed" class="form-select"><option value="1">Yes</option><option value="0">No</option></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Property area</label>
                                <select name="property_area" class="form-select"><option value="2">Urban</option><option value="1">Semi Urban</option><option value="0">Rural</option></select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Applicant income (₹)</label>
                                <input type="number" step="any" name="applicant_income" class="form-control" placeholder="50000" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Co-applicant income (₹)</label>
                                <input type="number" step="any" name="coapplicant_income" class="form-control" placeholder="0" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Loan amount (₹)</label>
                                <input type="number" step="any" name="loan_amount" class="form-control" placeholder="120000" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Loan term (months)</label>
                                <input type="number" step="any" name="loan_term" class="form-control" placeholder="360" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Credit history</label>
                                <select name="credit_history" class="form-select"><option value="1">Good Credit History</option><option value="0">Poor Credit History</option></select>
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit" class="btn-glow w-100 justify-content-center">Run prediction <span class="pip"><i class="ph ph-arrow-right"></i></span></button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const io = new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:0.08});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
</body>
</html>
